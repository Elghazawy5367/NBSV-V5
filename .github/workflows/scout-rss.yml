name: 📡 Scout RSS — Yanko + Core77 Daily Discovery

# ARCHITECTURE NOTE (v5.0):
# Fetches design concept RSS feeds (Yanko Design, Core77).
# These are "never manufactured" concepts — designs that exist as ideas but were
# never produced commercially. NBSV's Channel 3 (Concept Library) source.
# Proactive: runs daily, creates Issues, you only see survivors.

on:
  schedule:
    - cron: '30 6 * * *'   # Daily 06:30 UTC = 08:30 Egypt
  workflow_dispatch:

permissions:
  issues: write
  contents: read
  models: read

jobs:
  scout-rss:
    runs-on: ubuntu-latest
    steps:

      - name: Fetch Yanko Design and Core77 RSS feeds
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            console.log('📡 Scout RSS starting — fetching Yanko Design + Core77...');

            // ── 1. RSS Feed definitions ────────────────────────────────────
            const feeds = [
              { name: 'Yanko Design', url: 'https://www.yankodesign.com/feed/', label: 'scout-yanko' },
              { name: 'Core77', url: 'https://www.core77.com/rss', label: 'scout-core77' },
            ];

            // ── 2. Fetch and parse RSS feeds ───────────────────────────────
            const parseRSS = (xml, sourceName) => {
              const items = [];
              const itemRegex = /<item>([\s\S]*?)<\/item>/g;
              let match;
              while ((match = itemRegex.exec(xml)) !== null) {
                const item = match[1];
                const title = (item.match(/<title>(?:<!\[CDATA\[)?([\s\S]*?)(?:\]\]>)?<\/title>/) || [])[1]?.trim();
                const link  = (item.match(/<link>([\s\S]*?)<\/link>/)   || [])[1]?.trim()
                           || (item.match(/<guid[^>]*>([\s\S]*?)<\/guid>/) || [])[1]?.trim();
                const desc  = (item.match(/<description>(?:<!\[CDATA\[)?([\s\S]*?)(?:\]\]>)?<\/description>/) || [])[1]
                              ?.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim().slice(0, 300);
                const pubDate = (item.match(/<pubDate>([\s\S]*?)<\/pubDate>/) || [])[1]?.trim();
                if (title && link) items.push({ title, link, desc: desc || '', pubDate: pubDate || '', source: sourceName });
              }
              return items;
            };

            let allItems = [];
            for (const feed of feeds) {
              try {
                const res = await fetch(feed.url, {
                  headers: { 'User-Agent': 'NBSV-Scout-Agent/5.0', 'Accept': 'application/rss+xml, application/xml, text/xml' }
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const xml = await res.text();
                const items = parseRSS(xml, feed.name).slice(0, 10); // Max 10 per feed
                console.log(`✓ ${feed.name}: fetched ${items.length} items`);
                allItems = allItems.concat(items.map(i => ({ ...i, feedLabel: feed.label })));
              } catch(e) {
                console.log(`⚠ ${feed.name} fetch failed: ${e.message}`);
              }
            }

            if (allItems.length === 0) {
              console.log('No items fetched from any feed.');
              return;
            }

            // ── 3. Deduplicate against already-scouted issues ──────────────
            const { data: existingIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'scout-yanko,scout-core77',
              state: 'all',
              per_page: 100,
            });
            const alreadyScouted = new Set(
              existingIssues.map(i => {
                const m = i.body?.match(/\*\*Article URL:\*\*\s*(.+)/);
                return m ? m[1].trim() : null;
              }).filter(Boolean)
            );

            const newItems = allItems.filter(item => !alreadyScouted.has(item.link));
            console.log(`${newItems.length} new items (${allItems.length - newItems.length} already scouted)`);

            if (newItems.length === 0) {
              console.log('All recent articles already scouted.');
              return;
            }

            // ── 4. AI triage with GPT-4o-mini ──────────────────────────────
            const itemList = newItems.map((item, i) =>
              `[${i+1}] SOURCE: ${item.source} | TITLE: "${item.title}" | DESC: ${item.desc}`
            ).join('\n\n');

            const triagePrompt = `You are the NBSV Scout Triage Agent screening design concept articles for an Egyptian micro-manufacturing business.

NBSV SYSTEM: Egyptian solo founder reproduces physically innovative products locally before they reach Egypt. Products must be workshop-producible from MDF/plywood/acrylic/aluminum/fabric/foam/EVA with ZERO electronics. Products must trigger an AHA response in 3 seconds on a shop shelf without explanation.

ARTICLES TO SCREEN:
${itemList}

INSTANT KILL criteria — mark FAIL if ANY applies:
- Electronic component required (LED, battery, USB, sensor, motor, screen)
- Injection-molded plastic is the core component
- Digital/app/software product
- Medical, food, chemical, or consumable
- Architectural/building-scale project
- Conceptual art piece with no commercial application
- Scale or complexity impossible for small workshop
- Core material must be imported

RESPOND IN THIS EXACT FORMAT:
[1] PASS/FAIL/INVESTIGATE | Kill reason or potential (max 10 words) | Egyptian behavior match hint (max 8 words)
[2] PASS/FAIL/INVESTIGATE | ...

PASS = physically producible concept with Egyptian potential
FAIL = instant kill triggered
INVESTIGATE = interesting but uncertain about producibility
Be ruthless. Most design concept articles are not workshop-producible.`;

            let triageResults = [];
            try {
              const aiRes = await fetch('https://models.inference.ai.azure.com/chat/completions', {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`,
                },
                body: JSON.stringify({
                  model: 'gpt-4o-mini',
                  messages: [{ role: 'user', content: triagePrompt }],
                  max_tokens: 700,
                  temperature: 0.2,
                }),
              });

              if (aiRes.ok) {
                const aiData = await aiRes.json();
                const rawText = aiData.choices?.[0]?.message?.content || '';
                console.log('AI triage:\n' + rawText);
                triageResults = rawText.split('\n')
                  .filter(line => line.match(/^\[(\d+)\]/))
                  .map(line => {
                    const m = line.match(/^\[(\d+)\]\s+(PASS|FAIL|INVESTIGATE)\s*\|\s*([^|]+)\|\s*(.+)/);
                    return m ? { index: parseInt(m[1])-1, verdict: m[2], reason: m[3].trim(), hint: m[4].trim() } : null;
                  })
                  .filter(Boolean);
              } else {
                console.log(`GitHub Models error: ${aiRes.status}`);
                triageResults = newItems.slice(0, 3).map((_,i) => ({
                  index: i, verdict: 'INVESTIGATE', reason: 'AI unavailable', hint: 'Manual review needed'
                }));
              }
            } catch(e) {
              console.log(`AI triage error: ${e.message}`);
            }

            // ── 5. Create Issues for PASS and INVESTIGATE ─────────────────
            const toCreate = triageResults.filter(r => r.verdict !== 'FAIL');
            console.log(`Creating ${toCreate.length} Issues`);

            for (const result of toCreate) {
              const item = newItems[result.index];
              if (!item) continue;

              const labels = ['candidate', item.feedLabel, 'source-concept-library', 'pending-verification'];
              if (result.verdict === 'INVESTIGATE') labels.push('needs-human-review');

              const issueBody = `## 📡 Scout RSS — Auto-Discovered Design Concept
*Discovered by Scout RSS Agent — ${new Date().toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'})}*

---

### Source
**Publication:** ${item.source}
**Article URL:** ${item.link}
${item.pubDate ? `**Published:** ${item.pubDate}` : ''}

### Product Name (internal reference)
${item.title.slice(0, 80)}

### Source Channel
Channel 3 — Concept Library (Yanko / Core77 / Behance / Reddit)

### Channel Signal (virality proof)
${item.source} feature — high editorial curation signal

### Scout AI Triage
**Verdict:** ${result.verdict}
**Reason:** ${result.reason}
**Egyptian fit hint:** ${result.hint}

### What You Saw (from article)
> ${item.desc || 'Read full article at link above.'}

---

### FOUNDER ACTION REQUIRED

**Step 1:** Read full article: [Open Article →](${item.link})
**Step 2:** Answer the Egyptian Behavior Question below
**Step 3:** Check if the concept is actually physically producible — can you describe it to a workshop owner in one sentence?
**Step 4:** Check Egyptian market (5 platforms) — Gap Sentinel posts links in 24h

### Egyptian Behavior Answer
*(Replace this line — What SPECIFIC Egyptian behavior does this replace or enhance?)*

### Egyptian Market Pre-Check
- [ ] Jumia Egypt — exact product searched — CLEAN
- [ ] Noon Egypt — exact product searched — CLEAN
- [ ] Facebook Marketplace Egypt — CLEAN
- [ ] Instagram Egypt — CLEAN
- [ ] Google Lens reverse image — CLEAN

### Likely Production Path
*(Standard Workshop ≤80 EGP / Semi-DIY Finish ≤120 EGP / Unknown)*

### Season Context
*(Continuous Demand / Ramadan / Eid / Back to School / etc.)*

---
*Scout RSS v5.0 — Auto-created by NBSV Agent Swarm — NBSV v5.0*`;

              try {
                const { data: newIssue } = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: `🎯 [SCOUT-RSS] ${item.title.slice(0, 80)}`,
                  body: issueBody,
                  labels,
                });
                console.log(`✓ Issue #${newIssue.number}: "${item.title.slice(0,60)}"`);
              } catch(e) {
                console.log(`⚠ Failed to create issue: ${e.message}`);
              }
            }

            const failed = triageResults.filter(r => r.verdict === 'FAIL').length;
            console.log(`\nScout RSS complete. ${toCreate.length} Issues created, ${failed} FAILs discarded.`);
