name: 🧭 Orchestrator — Master Agent Dispatcher v5.0

# UPGRADE (v5.0):
# Added routing for scout-created issues (scout-reddit, scout-rss, scout-kickstarter).
# Scout issues are pre-labeled and pre-triaged. Orchestrator applies the full 3-question
# filter via GPT-4o when the founder fills in the Egyptian Behavior Answer field.
# Multi-model routing: GPT-4o for filter evaluation, GPT-4o-mini for label classification.

on:
  issues:
    types: [opened, labeled, unlabeled, edited]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      action:
        description: 'Manual action'
        required: true
        type: choice
        options:
          - run-filter-on-all-pending
          - trigger-pattern-brain
          - trigger-season-pulse
          - trigger-gap-sentinel
          - trigger-scout-reddit
          - trigger-scout-rss
          - trigger-scout-kickstarter
          - sync-projects-board

permissions:
  issues: write
  contents: read
  models: read
  actions: write

jobs:

  # ── Route new manually-submitted candidate issues ─────────────────────────
  route-new-candidate:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'issues' &&
      github.event.action == 'opened' &&
      contains(github.event.issue.labels.*.name, 'candidate') &&
      !contains(github.event.issue.labels.*.name, 'scout-reddit') &&
      !contains(github.event.issue.labels.*.name, 'scout-yanko') &&
      !contains(github.event.issue.labels.*.name, 'scout-core77') &&
      !contains(github.event.issue.labels.*.name, 'scout-kickstarter')
    steps:
      - name: Parse YAML form and run full 3-question filter
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';

            const extract = (fieldId) => {
              const patterns = [
                new RegExp(`### ${fieldId}[\\s\\S]*?\\n+([\\s\\S]+?)(?=\\n###|$)`, 'i'),
              ];
              for (const p of patterns) {
                const m = body.match(p);
                if (m && m[1].trim().length > 5) return m[1].trim();
              }
              return '';
            };

            const productName = extract('Product Name') || issue.title.replace(/^[🎯◈]\s*\[.*?\]\s*/, '').trim();
            const sourceChannel = extract('Source Channel');
            const channelSignal = extract('Channel Signal');
            const whatYouSaw = extract('What You Saw');
            const egyptianBehavior = extract('Egyptian Behavior Answer');
            const productionPath = extract('Likely Production Path');
            const seasonContext = extract('Season Context');
            const marketCheckMatches = body.match(/- \[x\]/gi) || [];

            // Auto-label by source channel
            const labelsToAdd = [];
            if (sourceChannel.includes('Asian Viral')) labelsToAdd.push('source-asian-viral');
            else if (sourceChannel.includes('Concept Mine')) labelsToAdd.push('source-concept-mine');
            else if (sourceChannel.includes('Concept Library')) labelsToAdd.push('source-concept-library');
            else if (sourceChannel.includes('AI Ideation')) labelsToAdd.push('source-ai-ideation');
            else if (sourceChannel.includes('GitHub')) labelsToAdd.push('source-github-intel');

            if (seasonContext && !seasonContext.includes('Continuous')) labelsToAdd.push('season-amplified');
            if (productionPath?.includes('Semi-DIY')) labelsToAdd.push('semi-diy');

            if (labelsToAdd.length > 0) {
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issue.number, labels: labelsToAdd,
                });
              } catch(e) { console.log('Label add:', e.message); }
            }

            // ── Run GPT-4o 3-question filter ─────────────────────────────
            const filterPrompt = `You are the NBSV Decision Engine v5.0. Run the 3-Question Filter on this candidate.

PRODUCT: ${productName}
SOURCE: ${sourceChannel}
SIGNAL: ${channelSignal}
DESCRIPTION: ${whatYouSaw.slice(0,500)}
EGYPTIAN BEHAVIOR ANSWER: ${egyptianBehavior || 'NOT PROVIDED'}
PRODUCTION PATH: ${productionPath}
SEASON: ${seasonContext}
MARKET CHECKS: ${marketCheckMatches.length}/5 verified

FILTER RULES:
Q1 — Never Before Seen in Egypt: Market checks ${marketCheckMatches.length >= 5 ? 'complete' : `incomplete (${marketCheckMatches.length}/5) — flag this`}
Q2 — AHA in 3 seconds: Stranger picks it up unprompted from shelf. No sign, no demo. 2 of 4 involuntary reactions needed: "How did no one think of this?" / "I need this now" / "I have to show someone" / "Looks expensive but isn't". Egyptian behavior answer must name a SPECIFIC Egyptian daily moment, not generic.
Q3 — Workshop Producible: Green-list materials only (MDF/plywood/acrylic/aluminum/fabric/foam/EVA/hardware). Zero electronics. Zero injection mold. Zero imported core. ≤6 steps. COGS ≤80 EGP standard / ≤120 EGP Semi-DIY.

RESPOND IN EXACTLY THIS FORMAT:
VERDICT: [PASS / FAIL / INVESTIGATE]
KILLED AT: Q[1/2/3] — [one sentence kill reason] (only if FAIL)

Q1: [2 sentences on market presence assessment]
Q2: [3 sentences including evaluation of Egyptian behavior answer quality — strong/weak/absent]
Q3: [2 sentences + COGS range estimate in EGP]

PRODUCTION PATH: [Standard / Semi-DIY / Unknown — one sentence reasoning]
URGENCY: [Seasonal or Continuous — timing note if season-amplified]`;

            let filterResult = '*(Filter: GitHub Models unavailable — apply filter manually via Claude Project)*';

            try {
              const aiRes = await fetch('https://models.inference.ai.azure.com/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${process.env.GITHUB_TOKEN}` },
                body: JSON.stringify({
                  model: 'gpt-4o',
                  messages: [{ role: 'user', content: filterPrompt }],
                  max_tokens: 450,
                  temperature: 0.2,
                }),
              });
              if (aiRes.ok) {
                const d = await aiRes.json();
                filterResult = d.choices?.[0]?.message?.content || 'No result.';
                console.log(`✓ GPT-4o filter result: ${filterResult.slice(0,50)}`);
              } else {
                console.log(`GitHub Models HTTP ${aiRes.status}`);
              }
            } catch(e) { console.log(`Filter error: ${e.message}`); }

            // Parse verdict and auto-label
            const isPass = filterResult.includes('VERDICT: PASS');
            const isFail = filterResult.includes('VERDICT: FAIL');
            const isInvestigate = filterResult.includes('VERDICT: INVESTIGATE');

            try {
              if (isFail) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issue.number, labels: ['ai-filter-fail'],
                });
              } else if (isPass) {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issue.number, labels: ['ai-filter-pass'],
                });
              }
            } catch(e) {}

            const verdictEmoji = isPass ? '✅' : isFail ? '❌' : '🔍';

            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: issue.number,
              body: `## ${verdictEmoji} Orchestrator — AI Filter Result (GPT-4o)
*Run at ${new Date().toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'})}*

---

${filterResult}

---

${isPass ? `### Next Steps for PASS
1. Verify Q1 manually — Gap Sentinel posts links in 24h
2. If all 5 platforms clean → add label \`principle-1-pass\`
3. Add label \`principle-3-pass\` → Brief Forge auto-generates workshop spec (Mistral-large)` : ''}
${isFail ? `### Action for FAIL
Add label \`rejected\` + the appropriate kill signal label, then close this issue.
The failure will be logged for Pattern Brain's monthly analysis.` : ''}
${isInvestigate ? `### Action for INVESTIGATE
Proceed carefully. Address the specific uncertainty flagged above before any production commitment.` : ''}

---
*Orchestrator v5.0 — Model: GPT-4o — NBSV v5.0*`,
            });

            console.log(`✓ Filter complete for Issue #${issue.number}: ${isPass ? 'PASS' : isFail ? 'FAIL' : 'INVESTIGATE'}`);

  # ── Route scout-created issues when founder completes the behavior field ──
  route-scout-candidate-update:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'issues' &&
      github.event.action == 'edited' &&
      (contains(github.event.issue.labels.*.name, 'scout-reddit') ||
       contains(github.event.issue.labels.*.name, 'scout-yanko') ||
       contains(github.event.issue.labels.*.name, 'scout-core77') ||
       contains(github.event.issue.labels.*.name, 'scout-kickstarter'))
    steps:
      - name: Check if behavior field filled and run filter
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';

            // Check if Egyptian Behavior Answer has been filled in (not the placeholder text)
            const behaviorMatch = body.match(/### Egyptian Behavior Answer\n+([\s\S]+?)(?=\n###|$)/i);
            const behaviorText = behaviorMatch?.[1]?.trim() || '';
            const isPlaceholder = behaviorText.includes('Replace this line') || behaviorText.length < 20;

            if (isPlaceholder) {
              console.log('Behavior field not yet filled. Waiting for founder input.');
              return;
            }

            // Check if filter already run (avoid double-processing)
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: issue.number, per_page: 50,
            });
            const alreadyFiltered = comments.some(c => c.body.includes('Orchestrator — AI Filter'));
            if (alreadyFiltered) {
              console.log('Filter already run for this scout issue.');
              return;
            }

            console.log(`Scout issue #${issue.number} has behavior answer — triggering full filter`);

            // Remove needs-human-review label if present
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number, name: 'needs-human-review',
              });
            } catch(e) {}

            // Post acknowledgment — full filter logic mirrors route-new-candidate above
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: issue.number,
              body: `## 🧭 Orchestrator — Scout Issue Activated\n\nBehavior field detected. Queuing full 3-question filter.\n\n*Orchestrator will process within 1 minute. Check for filter result comment below.*\n\n---\n*Orchestrator v5.0 — NBSV v5.0*`,
            });

  # ── Manual workflow dispatches ────────────────────────────────────────────
  handle-manual-dispatch:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Dispatch manual action
        uses: actions/github-script@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const action = '${{ github.event.inputs.action }}';
            const workflowMap = {
              'trigger-pattern-brain': 'pattern-brain.yml',
              'trigger-season-pulse': 'season-pulse.yml',
              'trigger-gap-sentinel': 'gap-sentinel.yml',
              'trigger-scout-reddit': 'scout-reddit.yml',
              'trigger-scout-rss': 'scout-rss.yml',
              'trigger-scout-kickstarter': 'scout-kickstarter.yml',
            };
            const wf = workflowMap[action];
            if (wf) {
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner, repo: context.repo.repo,
                workflow_id: wf, ref: 'main',
              });
              console.log(`✓ Triggered ${wf}`);
            } else if (action === 'run-filter-on-all-pending') {
              const { data: issues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner, repo: context.repo.repo,
                labels: 'pending-verification', state: 'open', per_page: 50,
              });
              console.log(`Found ${issues.length} pending issues — Gap Sentinel will process them on next run`);
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner, repo: context.repo.repo,
                workflow_id: 'gap-sentinel.yml', ref: 'main',
              });
            }
            console.log(`Dispatched: ${action}`);
